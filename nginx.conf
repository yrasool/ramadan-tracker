server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 302 /ramadan-tracker/;
  }

  location /ramadan-tracker/ {
    try_files $uri $uri/ /ramadan-tracker/index.html;
  }

  location /health {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
